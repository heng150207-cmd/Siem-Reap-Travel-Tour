<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login Register</title>

    <link rel="stylesheet" href="./src/output.css" />
    <link rel="stylesheet" href="./src/theme.css" />
  </head>

  <body
    class="min-h-screen flex items-center justify-center bg-cover bg-center"
    style="background-image: url(./image/bg.jpg)"
  >
    <button type="button" data-theme-toggle aria-label="Toggle theme"
      class="fixed top-4 right-4 z-50 w-10 h-10 rounded-full border border-white/40 bg-black/30 backdrop-blur text-white hover:bg-black/40 transition">
      <span data-theme-icon aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z" />
        </svg>
      </span>
    </button>
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>

    <!-- Container -->

    <div
      class="relative w-[900px] min-h-[520px] bg-white/20 backdrop-blur-xl rounded-xl shadow-2xl overflow-hidden flex"
    >
      <!-- Image Side -->

      <div class="w-1/2 hidden md:block relative">
        <img
          src="./image/bg.jpg"
          class="w-full h-full object-cover"
        />

        <div class="absolute inset-0 bg-black/30"></div>

        <div class="absolute bottom-10 left-10 text-white">
          <h1 class="text-4xl font-bold">
            ENJOY THE<br />
            WORLD
          </h1>

          <p class="mt-4 text-sm max-w-xs">
            Discover beautiful places and create unforgettable memories.
          </p>

          <button class="mt-6 bg-white text-black px-6 py-2 rounded-md">
            Learn More
          </button>
        </div>
      </div>

      <!-- Form Side -->

      <div class="w-full md:w-1/2 bg-[#084D91] p-10">
        <!-- Logo -->

        <div
          class="text-center text-white mb-8 flex items-center justify-center"
        >
          <img
            src="./image/logo.png"
            alt="Travel Logo"
            class="w-32 h-32 mb-6 rounded-full"
          />
        </div>

        <!-- LOGIN -->

        <div id="login">
          <h2 class="text-white text-2xl text-center font-bold mb-6">SIEM REAB TOUR</h2>
          <h2 class="text-white text-2xl text-center font-bold mb-6">Login</h2>

          <form class="space-y-4">
            <input
              type="email"
              placeholder="Email Address"
              class="w-full px-6 py-3 rounded bg-white focus:outline-none"
            />

            <input
              type="password"
              placeholder="Password"
              class="w-full px-6 py-3 rounded bg-white focus:outline-none"
            />
            
              <button
              class="w-full bg-white text-blue-900 py-3 rounded font-bold hover:bg-gray-200"
            ><a href="./index.html">
              Login</a>
            </button>
            
          </form>

          <p class="text-center text-white mt-5">
            Don't have account?

            <button onclick="showRegister()" class="underline font-bold">
              Register
            </button>
          </p>
        </div>

        <!-- REGISTER -->

        <div id="register" class="hidden">
          <h2 class="text-white text-2xl text-center font-bold mb-6">
            Create Account
          </h2>

          <form class="space-y-3">
            <input
              type="text"
              placeholder="Full Name"
              class="w-full px-6 py-3 rounded bg-white focus:outline-none"
            />

            <input
              type="email"
              placeholder="Email Address"
              class="w-full px-6 py-3 rounded bg-white focus:outline-none"
            />

            <input
              type="password"
              placeholder="Password"
              class="w-full px-6 py-3 rounded bg-white focus:outline-none"
            />

            <input
              type="password"
              placeholder="Confirm Password"
              class="w-full px-6 py-3 rounded bg-white focus:outline-none"
            />

            <button
              class="w-full bg-white text-blue-900 py-3 rounded font-bold hover:bg-gray-200"
            >
              Register
            </button>
          </form>

          <p class="text-center text-white mt-5">
            Already have account?

            <button onclick="showLogin()" class="underline font-bold">
              Login
            </button>
          </p>
        </div>
      </div>
    </div>

    <script src="./src/theme.js"></script>
    <script>
      function showRegister() {
        document.getElementById("login").classList.add("hidden");

        document.getElementById("register").classList.remove("hidden");
      }

      function showLogin() {
        document.getElementById("register").classList.add("hidden");

        document.getElementById("login").classList.remove("hidden");
      }
    </script>
  </body>
</html>
